<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | DIU Electricity Monitoring</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="dashboard-page">

    <button id="burgerBtn" class="burger-btn" type="button" aria-label="Toggle sidebar" aria-expanded="false">
        ☰
    </button>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark small">⚡</div>
            <div>
                <h2>ElectroAdmin</h2>
                <span>Smart Monitoring</span>
            </div>
        </div>

        <nav class="side-nav">
            <a href="dashboard.html" class="active">Dashboard</a>
        </nav>

        <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </aside>

    <main class="main-content">
        <div class="content-shell">

            <header class="topbar">
                <div class="topbar-title">
                    <p class="eyebrow">Admin Home</p>
                    <h1>Welcome, <span id="adminName">Admin</span></h1>
                    <p class="muted">Add and manage location homepages dynamically.</p>
                </div>
            </header>

            <div class="center-action-wrap">
                <button id="openModalBtn" class="add-location-btn center-add-btn" type="button">
                    <span>+</span> Add Location
                </button>
            </div>

            <div id="dashboardAlert" class="alert hidden"></div>

            <section id="locationSection" class="locations-panel">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Location Cards</p>
                        <h2>Added Locations</h2>
                    </div>
                </div>

                <div id="locationGrid" class="location-grid"></div>
            </section>

        </div>
    </main>

    <div id="locationModal" class="modal" aria-hidden="true">
        <div class="modal-card">
            <div class="modal-head">
                <div>
                    <p class="eyebrow">New Location</p>
                    <h2>Add Location Homepage</h2>
                </div>

                <button id="closeModalBtn" class="close-btn" type="button">×</button>
            </div>

            <form id="locationForm">
                <div class="form-grid single-form-grid">
                    <div class="form-group">
                        <label for="locationName">Location Name</label>
                        <input id="locationName" type="text" placeholder="Daffodil Smart City" required>
                    </div>

                    <div class="form-group">
                        <label for="verificationTable">Verification ID / Database Table Name</label>
                        <input id="verificationTable" type="text" placeholder="daffodil_smart_city" required>
                        <small>Must match an existing table name in the database.</small>
                    </div>

                    <div class="form-group">
                        <label for="pageLink">Homepage Link</label>
                        <input id="pageLink" type="url" placeholder="http://localhost/diu_electricity_monitoring/daffodil_smart_city/" required>
                    </div>
                </div>

                <div id="formAlert" class="alert hidden"></div>

                <div class="modal-actions">
                    <button type="button" id="cancelModalBtn" class="btn-light">Cancel</button>
                    <button id="saveLocationBtn" type="submit" class="btn-primary">Save Location</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
