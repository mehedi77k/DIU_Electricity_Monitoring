<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daffodil Smart City | Electricity Monitor</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="campus-page">
    <button class="burger-btn" id="burgerBtn" type="button" aria-label="Open menu" aria-expanded="false">
        ☰
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark small">⚡</div>
            <div>
                <h2>Smart City</h2>
                <span>Electricity Monitor</span>
            </div>
        </div>

        <nav class="side-nav">
            <a href="./" class="active">Daffodil Smart City</a>
            <a href="../electricity_frontend/dashboard.html">Admin Dashboard</a>
            <a href="../electricity_frontend/index.html">Admin Login</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="content-shell">
            <header class="topbar">
                <div class="topbar-title">
                    <p class="eyebrow">Campus Home</p>
                    <h1>Daffodil Smart City</h1>
                    <p class="muted">Manage buildings, building homepages, and electricity readings.</p>
                </div>

                <div class="topbar-actions">
                    <button class="add-device-btn" id="addBuildingBtn" type="button">
                        <span>+</span>
                        Add Buildings
                    </button>
                </div>
            </header>

            <div id="pageAlert" class="alert hidden"></div>

            <section class="devices-panel" id="buildingSection">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Building Cards</p>
                        <h2>Added Buildings</h2>
                    </div>
                </div>

                <div class="device-grid" id="buildingGrid">
                    <!-- Building cards will load here -->
                </div>
            </section>
        </div>
    </main>

    <div class="modal-overlay hidden" id="buildingModal">
        <div class="modal-card">
            <div class="modal-head">
                <div>
                    <p class="eyebrow">Connect Building</p>
                    <h2>Add Building Homepage</h2>
                </div>

                <button class="modal-close-btn" id="modalCloseBtn" type="button" aria-label="Close modal">
                    ×
                </button>
            </div>

            <form
                id="buildingForm"
                class="building-form"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
            >
                <div class="form-group">
                    <label for="buildingName">Building Name</label>

                    <div class="suggest-wrap">
                        <input
                            type="text"
                            id="buildingName"
                            name="building_name_manual_2026"
                            placeholder="Select or type building name"
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="off"
                            spellcheck="false"
                            required
                        />

                        <div
                            class="black-suggestion-box hidden"
                            id="buildingNameSuggestions"
                            role="listbox"
                        ></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="verificationId">Verification ID</label>

                    <div class="suggest-wrap">
                        <input
                            type="text"
                            id="verificationId"
                            name="verification_id_manual_2026"
                            placeholder="Enter verification ID manually"
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="off"
                            spellcheck="false"
                            required
                        />

                        <div
                            class="black-suggestion-box hidden"
                            id="verificationSuggestions"
                            role="listbox"
                        ></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pageLink">Homepage Link</label>

                    <div class="suggest-wrap">
                        <input
                            type="text"
                            id="pageLink"
                            name="homepage_link_manual_2026"
                            placeholder="Paste homepage link manually"
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="off"
                            spellcheck="false"
                            required
                        />

                        <div
                            class="black-suggestion-box hidden"
                            id="pageLinkSuggestions"
                            role="listbox"
                        ></div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-secondary" id="modalCancelBtn" type="button">
                        Cancel
                    </button>

                    <button class="add-device-btn" id="saveBuildingBtn" type="submit">
                        Save Building
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
