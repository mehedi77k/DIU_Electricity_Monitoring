<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sadhinota Sommelon Kendro (Main Auditorium) | Daffodil Smart City</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <button class="menu-btn" type="button" aria-label="Open menu">☰</button>
      <div>
        <p class="eyebrow">Building Home</p>
        <h1 id="buildingName">Sadhinota Sommelon Kendro (Main Auditorium)</h1>
        <p class="lead" id="buildingLead">Monitor devices and electricity readings for Sadhinota Sommelon Kendro (Main Auditorium).</p>
        <p class="status-row">
          <a class="back-link" id="campusLink" href="../index.html">← Back to Daffodil Smart City</a>
        </p>
      </div>
    </header>

    <section class="actions" aria-label="Admin actions">
      <a class="primary-btn" id="adminLink" href="#">
        <span class="plus">+</span>
        Add Device
      </a>
    </section>

    <section class="panel" aria-labelledby="deviceHeading">
      <p class="eyebrow">Device Cards</p>
      <h2 id="deviceHeading">Added Devices</h2>
      <div class="cards" id="cards">
        <div class="empty-card">
          <div>
            <div class="empty-icon">⚡</div>
            <h3>Loading devices...</h3>
            <p>Please wait.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
