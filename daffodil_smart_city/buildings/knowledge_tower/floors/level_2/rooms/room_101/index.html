<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room 101 | Daffodil Smart City</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #eef4fb;
      color: #172033;
    }

    .card {
      width: min(90%, 700px);
      padding: 42px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(28, 55, 90, 0.16);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    p {
      margin: 0;
      color: #6d7b91;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Room 101</h1>
    <p>knowledge tower - level 2 room homepage.</p>
  </main>
</body>
</html>
