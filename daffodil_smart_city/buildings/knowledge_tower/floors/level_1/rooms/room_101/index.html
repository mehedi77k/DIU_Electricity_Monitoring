<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room 101 | Daffodil Smart City</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #eef4fb;
            color: #172033;
        }

        .card {
            width: min(90%, 760px);
            padding: 42px;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(20, 45, 80, 0.14);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 42px;
        }

        p {
            margin: 0;
            color: #6d7b91;
            font-size: 18px;
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Room 101</h1>
        <p>knowledge tower - level 1 room homepage.</p>
    </div>
</body>
</html>
